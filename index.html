<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B 站收藏集下载器</title>

    <!-- API_BASE 必须先定义，后续静态文件和 API 请求都依赖它 -->
    <script>
        window.API_BASE = (function () {
            var p = location.pathname.replace(/\/+$/, '').split('/')[1];
            return p === "bili" ? "/bili" : "";
        })();
    </script>

    <!-- CSS：通过 API_BASE 动态加载，适配 Apache 反代路径 -->
    <script>
        (function () {
            var css = document.createElement('link');
            css.rel = 'stylesheet';
            css.href = window.API_BASE + '/static/style.css';
            document.head.appendChild(css);
        })();
    </script>

    <!-- 本地 JS 库：通过 API_BASE 加载，兼容反代路径 -->
    <script>
        (function () {
            var base = window.API_BASE + '/static/';
            ['jsQR.min.js', 'jszip.min.js', 'FileSaver.min.js'].forEach(function (f) {
                var s = document.createElement('script');
                s.src = base + f;
                document.head.appendChild(s);
            });
        })();
    </script>
</head>

<body>
    <header>
        <div class="logo">📦</div>
        <div>
            <h1>B 站收藏集下载器</h1>
            <div class="sub">输入 act_id 或上传二维码图片</div>
        </div>
    </header>

    <div class="wrap">
        <!-- ─── Input card ─── -->
        <div class="card">
            <div class="card-title">🔍 按 act_id 查询</div>

            <div class="id-row">
                <input type="text" id="act-id-input" placeholder="输入 act_id，例：13688" />
            </div>
            <div class="hint">
                💡 支持多个 act_id，用英文逗号分隔，例：<code>112727,112728,112729</code><br />
                也可粘贴含 <code>act_id</code> 的完整链接或 b23.tv 短链接。
            </div>

            <!-- QR upload section -->
            <div class="qr-section">
                <div class="qr-label">📷 或上传二维码图片</div>
                <div class="qr-zone" id="qr-zone">
                    <input type="file" id="qr-input" accept="image/*" multiple />
                    <div class="icon">🖼️</div>
                    <p>
                        点击选择或拖放二维码图片<br /><small>支持 JPG / PNG，可多选；识别成功后自动填入 act_id 并查询</small>
                    </p>
                </div>
                <div class="qr-thumbs" id="qr-thumbs"></div>
            </div>

            <!-- Options -->
            <div class="opts-row">
                <span class="opts-label">下载内容：</span>
                <div class="chk-grp">
                    <label class="chk-label"><input type="checkbox" id="opt-img" checked /> 🖼️ 图片</label>
                    <label class="chk-label"><input type="checkbox" id="opt-vid" checked /> 🎬
                        无水印视频</label>
                    <label class="chk-label"><input type="checkbox" id="opt-wm" checked /> 💧
                        带水印视频</label>
                </div>
            </div>

            <div class="actions">
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <button class="btn btn-primary" id="btn-start" onclick="startFetch()">
                        🚀 获取下载链接
                    </button>
                    <button class="btn btn-share" id="btn-share" onclick="doShare()">
                        🔗 分享
                    </button>
                    <button class="btn btn-ghost" onclick="clearAll()">🗑️ 清空</button>
                </div>
            </div>
        </div>

        <!-- ─── Progress ─── -->
        <div class="card prog-wrap" id="prog-wrap">
            <div class="card-title">⏳ 处理中…</div>
            <div class="prog-bar-bg">
                <div class="prog-bar" id="prog-bar"></div>
            </div>
            <div class="prog-text" id="prog-text">正在获取数据…</div>
        </div>

        <!-- ─── Results ─── -->
        <div class="results-wrap" id="results-wrap">
            <div class="result-hdr">
                <div class="card-title" style="margin: 0">📋 下载结果</div>
                <div style="display: flex; align-items: center; gap: 10px">
                    <div id="dl-type-chks" style="display: none; gap: 8px">
                        <label class="chk-label"><input type="checkbox" id="dl-chk-img" checked />🖼️</label>
                        <label class="chk-label"><input type="checkbox" id="dl-chk-vid" checked />🎬</label>
                        <label class="chk-label"><input type="checkbox" id="dl-chk-wm" checked />💧</label>
                    </div>
                    <button class="btn btn-green" id="btn-dl-all" style="display: none" onclick="downloadAll()">
                        ⬇️ 下载全部
                    </button>
                </div>
                <div id="zip-progress-text" style="
                  font-size: 12px;
                  color: #888;
                  min-height: 18px;
                  text-align: right;
                "></div>
            </div>
            <div id="alerts"></div>
            <div id="results-body"></div>
        </div>
    </div>

    <footer>B 站收藏集下载器 · 仅供学习研究，请遵守版权和用户协议</footer>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- 主应用 JS：通过 API_BASE 动态加载 -->
    <script>
        (function () {
            var js = document.createElement('script');
            js.src = window.API_BASE + '/static/app.js';
            js.defer = false;
            document.body.appendChild(js);
        })();
    </script>
</body>

</html>
